<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel do Mestre</title>

<link rel="stylesheet" href="css/mestre.css">

</head>

<body>

<div id="telaQR">

    <h1>O ENFERMEIRO RPG</h1>

    <h2>Entre na aventura</h2>

    <img src="img/qrcode.pneg" alt="QR Code">

    <p>
        Aponte a câmera do celular para participar
    </p>

    <button onclick="iniciarMestre()">
        COMEÇAR CAPÍTULO
    </button>

</div>


<div id="jogoMestre" style="display:none;">

    <div id="fade"></div>
    <div class="transicao"></div>
    <div id="cenario"></div>


    <div class="painel">

        <h1>O ENFERMEIRO RPG</h1>

        <div id="cabecalhoDialogo">

            <div id="personagem"></div>

            <div id="nomePersonagem"></div>

        </div>

        <div id="texto"></div>

        <h3>Escolhas</h3>

        <div id="escolhas"></div>

        <h3>Status de Procópio</h3>

        <div id="atributos"></div>

    </div>

</div>


<script src="js/engine.js"></script>
<script src="js/mestre.js"></script>

</body>

</html>
